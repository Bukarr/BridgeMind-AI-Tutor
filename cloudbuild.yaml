steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/bridgemind-backend:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bridgemind-backend:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - -c
      - |
        gcloud run deploy bridgemind-backend \
          --image gcr.io/$PROJECT_ID/bridgemind-backend:$COMMIT_SHA \
          --region ${_REGION:-us-central1} --platform managed --allow-unauthenticated \
          --set-env-vars GEMINI_API_KEY=${_GEMINI_API_KEY}

images:
  - 'gcr.io/$PROJECT_ID/bridgemind-backend:$COMMIT_SHA'

substitutions:
  _REGION: 'us-central1'
  _GEMINI_API_KEY: ''

timeout: '1200s'
